<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0d1230">
<title>Basketball Letters</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0d1230;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
#game{width:100%;height:100%;display:grid;place-items:center}
canvas{display:block;image-rendering:auto}
#loading{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(180deg,#0d1230,#1b2862);color:#fff;font-size:18px;font-weight:800;z-index:20}
</style>
</head>
<body>
<div id="loading">Loading Basketball Letters…</div>
<div id="game"></div>

<script>
const BASE_W=540;
const BASE_H=960;
const DPR=Math.min(window.devicePixelRatio||1,3);

function pickVoice(){
  if(!("speechSynthesis" in window)) return null;
  const voices=speechSynthesis.getVoices();
  const preferred=["Samantha","Ava","Allison","Joelle","Tessa","Karen","Moira","Susan"];
  for(const name of preferred){
    const voice=voices.find(v=>v.name.includes(name)&&v.lang.startsWith("en"));
    if(voice) return voice;
  }
  return voices.find(v=>v.lang==="en-US") || voices.find(v=>v.lang.startsWith("en")) || voices[0] || null;
}

function speakLine(text){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=.9;
  u.pitch=1.24;
  u.volume=1;
  const voice=pickVoice();
  if(voice) u.voice=voice;
  speechSynthesis.speak(u);
}

class LetterGame extends Phaser.Scene{
  constructor(){super("LetterGame")}

  create(){
    document.getElementById("loading").style.display="none";
    this.index=0;
    this.locked=true;
    this.coins=Number(localStorage.getItem("letterQuestHDCoins")||0);

    this.createTextures();
    this.drawArcade();
    this.createHUD();
    this.createHoop();
    this.createBall();
    this.createReveal();
    this.createStartScreen();

    if("speechSynthesis" in window){
      speechSynthesis.onvoiceschanged=()=>pickVoice();
    }
  }

  createTextures(){
    this.createBasketballTexture();
    this.createSoftLetterTexture();
  }

  createBasketballTexture(){
    const size=512;
    const c=document.createElement("canvas");
    c.width=c.height=size;
    const ctx=c.getContext("2d");
    const cx=size/2, cy=size/2, r=226;

    const grad=ctx.createRadialGradient(cx-85,cy-95,20,cx,cy,r);
    grad.addColorStop(0,"#ffd28c");
    grad.addColorStop(.2,"#ffad4f");
    grad.addColorStop(.55,"#f47b2e");
    grad.addColorStop(.82,"#d64d1f");
    grad.addColorStop(1,"#7e250f");

    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle=grad;
    ctx.fill();

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.clip();

    // Pebbled leather texture
    for(let y=30;y<size-30;y+=7){
      for(let x=30;x<size-30;x+=7){
        const dx=x-cx,dy=y-cy;
        if(dx*dx+dy*dy<r*r){
          const jitterX=(Math.random()-.5)*2.4;
          const jitterY=(Math.random()-.5)*2.4;
          ctx.beginPath();
          ctx.arc(x+jitterX,y+jitterY,1.15,0,Math.PI*2);
          ctx.fillStyle=Math.random()>.5?"rgba(255,220,160,.22)":"rgba(80,20,5,.18)";
          ctx.fill();
        }
      }
    }

    // Dim lower-right side
    const shade=ctx.createRadialGradient(cx+70,cy+95,25,cx+70,cy+95,235);
    shade.addColorStop(0,"rgba(40,8,2,0)");
    shade.addColorStop(.75,"rgba(40,8,2,.08)");
    shade.addColorStop(1,"rgba(20,4,1,.42)");
    ctx.fillStyle=shade;
    ctx.fillRect(0,0,size,size);

    ctx.strokeStyle="#54210f";
    ctx.lineWidth=20;
    ctx.lineCap="round";

    ctx.beginPath();
    ctx.arc(cx,cy,r-10,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx-r,cy);
    ctx.bezierCurveTo(cx-70,cy-30,cx+70,cy+30,cx+r,cy);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx,cy-r);
    ctx.bezierCurveTo(cx-35,cy-100,cx+35,cy+100,cx,cy+r);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx-r*.72,cy-r*.72);
    ctx.bezierCurveTo(cx-35,cy-65,cx-35,cy+65,cx-r*.72,cy+r*.72);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx+r*.72,cy-r*.72);
    ctx.bezierCurveTo(cx+35,cy-65,cx+35,cy+65,cx+r*.72,cy+r*.72);
    ctx.stroke();

    // Gloss highlight
    const hi=ctx.createRadialGradient(cx-100,cy-112,4,cx-100,cy-112,92);
    hi.addColorStop(0,"rgba(255,255,255,.55)");
    hi.addColorStop(.35,"rgba(255,255,255,.18)");
    hi.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=hi;
    ctx.fillRect(0,0,size,size);

    ctx.restore();
    this.textures.addCanvas("basketballHD",c);
  }

  createSoftLetterTexture(){
    const c=document.createElement("canvas");
    c.width=c.height=512;
    const ctx=c.getContext("2d");
    const g=ctx.createRadialGradient(200,170,30,256,256,230);
    g.addColorStop(0,"rgba(255,255,255,.95)");
    g.addColorStop(.25,"rgba(255,255,255,.45)");
    g.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=g;
    ctx.fillRect(0,0,512,512);
    this.textures.addCanvas("softGlow",c);
  }

  drawArcade(){
    const g=this.add.graphics();

    g.fillGradientStyle(0x0c1130,0x0c1130,0x1d2b66,0x1d2b66,1);
    g.fillRect(0,0,BASE_W,BASE_H);

    // Back wall
    g.fillStyle(0x11183e,1);
    g.fillRoundedRect(58,102,BASE_W-116,610,40);
    g.lineStyle(10,0x3edff4,.95);
    g.strokeRoundedRect(58,102,BASE_W-116,610,40);

    // Neon rails
    g.lineStyle(6,0xff6f9f,.8);
    g.lineBetween(18,205,84,250);
    g.lineBetween(84,250,84,728);
    g.lineBetween(BASE_W-18,205,BASE_W-84,250);
    g.lineBetween(BASE_W-84,250,BASE_W-84,728);

    // Lane floor
    g.fillGradientStyle(0x3ca8df,0xea86a5,0x225f9f,0xa83d76,1);
    g.fillTriangle(92,760,BASE_W-92,760,BASE_W/2,300);

    g.fillStyle(0xffffff,.09);
    g.fillTriangle(92,760,BASE_W/2,760,BASE_W/2,300);

    // Side guards
    g.fillStyle(0x0d1230,1);
    g.fillRoundedRect(34,700,112,165,24);
    g.fillRoundedRect(BASE_W-146,700,112,165,24);

    g.fillStyle(0xff607e,.9);
    g.fillRoundedRect(48,720,9,112,5);
    g.fillRoundedRect(BASE_W-57,720,9,112,5);

    // Ambient dots
    for(let i=0;i<42;i++){
      g.fillStyle(0xffffff,Phaser.Math.FloatBetween(.08,.42));
      g.fillCircle(Phaser.Math.Between(20,BASE_W-20),Phaser.Math.Between(95,470),Phaser.Math.Between(1,4));
    }
  }

  createHUD(){
    this.add.text(BASE_W/2,34,"BASKETBALL LETTERS",{
      fontFamily:"Arial",fontSize:"30px",fontStyle:"bold",color:"#ffffff",
      stroke:"#090e25",strokeThickness:8
    }).setOrigin(.5);

    this.add.text(BASE_W/2,75,"Tap the ball • Watch it swish",{
      fontFamily:"Arial",fontSize:"18px",fontStyle:"bold",color:"#c7f7ff"
    }).setOrigin(.5);

    const coin=this.add.graphics();
    coin.fillStyle(0xffffff,.98);
    coin.fillRoundedRect(BASE_W-126,20,104,52,26);
    this.coinText=this.add.text(BASE_W-74,46,`⭐ ${this.coins}`,{
      fontFamily:"Arial",fontSize:"21px",fontStyle:"bold",color:"#111735"
    }).setOrigin(.5);

    const msg=this.add.graphics().setDepth(60);
    msg.fillStyle(0xffffff,.98);
    msg.fillRoundedRect(105,BASE_H-84,330,56,28);
    this.message=this.add.text(BASE_W/2,BASE_H-56,"Tap the basketball!",{
      fontFamily:"Arial",fontSize:"22px",fontStyle:"bold",color:"#111735"
    }).setOrigin(.5).setDepth(61);
  }

  createHoop(){
    this.add.rectangle(BASE_W/2,228,188,116,0xeaf7ff,.98)
      .setStrokeStyle(10,0xffffff).setDepth(8);
    this.add.rectangle(BASE_W/2,250,68,45,0xffffff,0)
      .setStrokeStyle(6,0xff5f73).setDepth(9);

    this.add.rectangle(BASE_W/2+80,430,16,360,0x6c789b).setDepth(3);
    this.add.rectangle(BASE_W/2+80,616,154,22,0x4b5675).setDepth(3);

    this.add.ellipse(BASE_W/2,304,110,25,0xdd4a21)
      .setStrokeStyle(9,0xdd4a21).setDepth(12);

    this.net=this.add.graphics().setDepth(11);
    this.drawNet(1,0);

    this.frontRim=this.add.graphics().setDepth(26);
    this.frontRim.lineStyle(9,0xff6d31,1);
    this.frontRim.beginPath();
    this.frontRim.arc(BASE_W/2,307,55,0,Math.PI,false);
    this.frontRim.strokePath();
  }

  drawNet(stretch=1,sway=0){
    this.net.clear();
    const top=315;
    const bottom=403+(stretch-1)*42;
    this.net.lineStyle(4,0xffffff,.98);
    this.net.lineBetween(BASE_W/2-40,top,BASE_W/2-24+sway,bottom);
    this.net.lineBetween(BASE_W/2+40,top,BASE_W/2+24+sway,bottom);
    this.net.lineBetween(BASE_W/2-24+sway,bottom,BASE_W/2+24+sway,bottom);

    for(let i=-32;i<=32;i+=16){
      this.net.lineBetween(BASE_W/2+i,top+4,BASE_W/2+i*.55+sway,bottom);
    }
    for(let y=335;y<bottom;y+=17){
      const p=(y-top)/(bottom-top);
      const width=38-(14*p);
      this.net.lineBetween(BASE_W/2-width+sway*p,y,BASE_W/2+width+sway*p,y);
    }
  }

  createBall(){
    this.ballShadow=this.add.ellipse(BASE_W/2,790,180,42,0x000000,.28).setDepth(15);

    this.ball=this.add.container(BASE_W/2,690).setDepth(24);
    this.ballImage=this.add.image(0,0,"basketballHD").setDisplaySize(170,170);
    this.ballLetter=this.add.text(0,2,"A",{
      fontFamily:"Arial Rounded MT Bold, Arial",fontSize:"68px",fontStyle:"bold",
      color:"#ffffff",stroke:"#7a2b17",strokeThickness:9
    }).setOrigin(.5);

    this.ball.add([this.ballImage,this.ballLetter]);
    this.ball.setSize(180,180).setInteractive({useHandCursor:true});
    this.ball.on("pointerdown",()=>this.shoot());
  }

  createReveal(){
    this.overlay=this.add.rectangle(BASE_W/2,BASE_H/2,BASE_W,BASE_H,0x071022,0)
      .setDepth(70).setVisible(false);

    this.glow=this.add.image(BASE_W/2,BASE_H/2,"softGlow")
      .setDisplaySize(440,440).setDepth(79).setAlpha(0);

    this.letterShadow=this.add.text(BASE_W/2+12,BASE_H/2+18,"A",{
      fontFamily:"Arial Rounded MT Bold, Arial",fontSize:"250px",fontStyle:"bold",
      color:"#5d1834",stroke:"#ffffff",strokeThickness:20
    }).setOrigin(.5).setDepth(81).setAlpha(0);

    this.letter=this.add.text(BASE_W/2,BASE_H/2,"A",{
      fontFamily:"Arial Rounded MT Bold, Arial",fontSize:"250px",fontStyle:"bold",
      color:"#ff6b6b",stroke:"#ffffff",strokeThickness:20
    }).setOrigin(.5).setDepth(82).setAlpha(0);
  }

  createStartScreen(){
    const shade=this.add.rectangle(BASE_W/2,BASE_H/2,BASE_W,BASE_H,0x0a1027,.9).setDepth(100);

    const card=this.add.graphics().setDepth(101);
    card.fillStyle(0xffffff,1);
    card.fillRoundedRect(54,145,BASE_W-108,650,36);

    const ball=this.add.image(BASE_W/2,270,"basketballHD").setDisplaySize(190,190).setDepth(102);

    const title=this.add.text(BASE_W/2,405,"Basketball Letters",{
      fontFamily:"Arial",fontSize:"38px",fontStyle:"bold",color:"#111735"
    }).setOrigin(.5).setDepth(102);

    const body=this.add.text(BASE_W/2,500,"Tap the letter ball.\nWatch it go through the net.\nLearn A through Z in order.",{
      fontFamily:"Arial",fontSize:"23px",fontStyle:"bold",align:"center",
      color:"#505b7d",lineSpacing:12
    }).setOrigin(.5).setDepth(102);

    const buttonShadow=this.add.graphics().setDepth(102);
    buttonShadow.fillStyle(0xa52f4c,.28);
    buttonShadow.fillRoundedRect(92,665,356,78,24);

    const button=this.add.graphics().setDepth(103);
    button.fillGradientStyle(0xff817c,0xff817c,0xec4f6c,0xec4f6c,1);
    button.fillRoundedRect(92,655,356,78,24);
    button.setInteractive(new Phaser.Geom.Rectangle(92,655,356,78),Phaser.Geom.Rectangle.Contains);

    const label=this.add.text(BASE_W/2,694,"START PLAYING",{
      fontFamily:"Arial",fontSize:"26px",fontStyle:"bold",color:"#ffffff",
      align:"center"
    }).setOrigin(.5).setDepth(104);

    button.on("pointerdown",()=>{
      speakLine("Let's play!");
      [shade,card,ball,title,body,buttonShadow,button,label].forEach(x=>x.destroy());
      this.prepareRound();
    });
  }

  prepareRound(){
    this.locked=false;
    const letter=String.fromCharCode(65+(this.index%26));
    const colors=[0xff6b6b,0x4dabf7,0xffd43b,0x69db7c,0xb197fc,0xff922b,0x38d9a9,0xf06595];
    const color=colors[this.index%colors.length];

    this.ballLetter.setText(letter);
    this.letter.setText(letter).setColor("#"+color.toString(16).padStart(6,"0"));
    this.letterShadow.setText(letter);

    this.ball.setPosition(BASE_W/2,690).setScale(1).setAlpha(1).setDepth(24);
    this.ballImage.setAngle(0);
    this.ballLetter.setAngle(0);

    this.ballShadow.setPosition(BASE_W/2,790).setScale(1).setAlpha(.28);
    this.message.setText(`Tap the ${letter} ball!`);
  }

  shoot(){
    if(this.locked) return;
    this.locked=true;
    const letter=String.fromCharCode(65+(this.index%26));
    this.message.setText("Here it goes!");

    this.tweens.add({
      targets:this.ballShadow,scaleX:.38,scaleY:.38,alpha:.07,duration:1050,ease:"Sine.Out"
    });

    const path=new Phaser.Curves.CubicBezier(
      new Phaser.Math.Vector2(BASE_W/2,690),
      new Phaser.Math.Vector2(100,340),
      new Phaser.Math.Vector2(430,165),
      new Phaser.Math.Vector2(BASE_W/2,300)
    );

    const follow={t:0};
    this.tweens.add({
      targets:follow,t:1,duration:1180,ease:"Sine.InOut",
      onUpdate:()=>{
        const p=path.getPoint(follow.t);
        this.ball.setPosition(p.x,p.y);

        // Spin ball texture only; letter remains upright.
        this.ballImage.angle-=11;

        const scale=1-follow.t*.48;
        this.ball.setScale(scale);
      },
      onComplete:()=>this.swish(letter)
    });
  }

  swish(letter){
    this.ball.setDepth(10);
    this.message.setText("SWISH!");

    this.tweens.addCounter({
      from:1,to:1.58,duration:250,yoyo:true,
      onUpdate:t=>{
        const sway=Math.sin(t.progress*Math.PI)*9;
        this.drawNet(t.getValue(),sway);
      }
    });

    this.tweens.add({
      targets:this.ball,y:410,scale:.43,alpha:.95,duration:380,ease:"Quad.In",
      onUpdate:()=>{ this.ballImage.angle-=14; },
      onComplete:()=>{
        this.ball.setAlpha(0);
        this.cameras.main.shake(90,.002);
        this.time.delayedCall(120,()=>this.celebrate(letter));
      }
    });
  }

  celebrate(letter){
    this.coins++;
    this.coinText.setText(`⭐ ${this.coins}`);
    localStorage.setItem("letterQuestHDCoins",this.coins);

    this.overlay.setVisible(true).setAlpha(0);
    this.tweens.add({targets:this.overlay,alpha:.72,duration:180});

    this.glow.setAlpha(0).setScale(.3);
    this.tweens.add({targets:this.glow,alpha:.9,scale:1.15,duration:500,ease:"Quad.Out"});

    this.letter.setPosition(BASE_W/2,340).setScale(.08).setAlpha(1).setAngle(-28);
    this.letterShadow.setPosition(BASE_W/2+12,355).setScale(.08).setAlpha(.34).setAngle(-28);

    const swirl={t:0};
    this.tweens.add({
      targets:swirl,t:1,duration:850,ease:"Back.Out",
      onUpdate:()=>{
        const t=swirl.t;
        const a=t*Math.PI*2.4;
        const radius=(1-t)*72;
        const x=BASE_W/2+Math.cos(a)*radius;
        const y=340+(BASE_H/2-340)*t+Math.sin(a)*radius*.35;
        const s=.08+t*1.04;
        const angle=-28+28*t+Math.sin(a)*6;

        this.letter.setPosition(x,y).setScale(s).setAngle(angle);
        this.letterShadow.setPosition(x+12,y+18).setScale(s).setAngle(angle);
      },
      onComplete:()=>{
        this.tweens.add({
          targets:[this.letter,this.letterShadow],
          scale:1.16,duration:145,yoyo:true,ease:"Sine.Out"
        });
      }
    });

    this.makeConfetti();
    this.makeSparkles();

    this.time.delayedCall(260,()=>{
      speakLine(`This is the letter ${letter}!`);
    });

    this.time.delayedCall(2200,()=>{
      this.tweens.add({
        targets:[this.letter,this.letterShadow,this.glow],
        alpha:0,scale:1.25,y:BASE_H/2-40,duration:360,
        onComplete:()=>{
          this.overlay.setVisible(false);
          this.index=(this.index+1)%26;
          this.prepareRound();
        }
      });
    });
  }

  makeConfetti(){
    const colors=[0xff5d73,0xffd43b,0x4dabf7,0x69db7c,0xb197fc,0xff922b,0x38d9a9];
    for(let i=0;i<92;i++){
      const p=this.add.rectangle(
        BASE_W/2+Phaser.Math.Between(-28,28),
        BASE_H/2+Phaser.Math.Between(-28,28),
        Phaser.Math.Between(8,14),
        Phaser.Math.Between(16,28),
        Phaser.Utils.Array.GetRandom(colors)
      ).setDepth(78).setAngle(Phaser.Math.Between(0,180));

      const d=Phaser.Math.Between(170,430);
      const a=Phaser.Math.FloatBetween(0,Math.PI*2);

      this.tweens.add({
        targets:p,
        x:p.x+Math.cos(a)*d,
        y:p.y+Math.sin(a)*d+160,
        angle:p.angle+Phaser.Math.Between(360,1100),
        alpha:0,
        duration:Phaser.Math.Between(1050,1700),
        ease:"Quad.Out",
        onComplete:()=>p.destroy()
      });
    }
  }

  makeSparkles(){
    for(let i=0;i<24;i++){
      const s=this.add.star(
        BASE_W/2+Phaser.Math.Between(-120,120),
        BASE_H/2+Phaser.Math.Between(-150,150),
        5,5,13,0xffffff,1
      ).setDepth(80).setScale(.12).setAlpha(0);

      this.tweens.add({
        targets:s,scale:Phaser.Math.FloatBetween(.75,1.4),alpha:1,angle:180,
        duration:280,yoyo:true,hold:Phaser.Math.Between(140,520),
        onComplete:()=>s.destroy()
      });
    }
  }
}

new Phaser.Game({
  type:Phaser.AUTO,
  parent:"game",
  width:BASE_W,
  height:BASE_H,
  resolution:DPR,
  backgroundColor:"#0d1230",
  scale:{
    mode:Phaser.Scale.FIT,
    autoCenter:Phaser.Scale.CENTER_BOTH,
    width:BASE_W,
    height:BASE_H
  },
  render:{
    antialias:true,
    antialiasGL:true,
    pixelArt:false,
    roundPixels:false,
    powerPreference:"high-performance"
  },
  scene:[LetterGame]
});
</script>
</body>
</html>
