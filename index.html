<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#10162f">
<title>Basketball Letters</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#10162f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
#game{width:100%;height:100%}
canvas{display:block;margin:auto}
#loading{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(180deg,#10162f,#1b2555);color:#fff;font-weight:800;font-size:18px;z-index:20}
</style>
</head>
<body>
<div id="loading">Loading Basketball Letters…</div>
<div id="game"></div>

<script>
const W=430,H=760;
const COLORS=[0xff6b6b,0x4dabf7,0xffd43b,0x69db7c,0xb197fc,0xff922b,0x38d9a9,0xf06595];

function selectVoice(){
  if(!("speechSynthesis" in window)) return null;
  const voices=speechSynthesis.getVoices();
  const names=["Samantha","Ava","Allison","Joelle","Tessa","Karen","Moira","Susan"];
  for(const n of names){
    const v=voices.find(x=>x.name.includes(n)&&x.lang.startsWith("en"));
    if(v) return v;
  }
  return voices.find(v=>v.lang==="en-US") || voices.find(v=>v.lang.startsWith("en")) || voices[0] || null;
}

function speak(text, options={}){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=options.rate ?? .92;
  u.pitch=options.pitch ?? 1.24;
  u.volume=1;
  const voice=selectVoice();
  if(voice) u.voice=voice;
  speechSynthesis.speak(u);
}

class GameScene extends Phaser.Scene{
  constructor(){super("GameScene")}

  preload(){}

  create(){
    document.getElementById("loading").style.display="none";
    this.index=0;
    this.locked=true;
    this.coins=Number(localStorage.getItem("letterQuestCoinsV2")||0);

    this.createBallTexture();
    this.drawBackground();
    this.createHUD();
    this.createHoop();
    this.createPlayer();
    this.createBall();
    this.createReveal();
    this.createMenu();

    if("speechSynthesis" in window){
      speechSynthesis.onvoiceschanged=()=>selectVoice();
    }
  }

  createBallTexture(){
    const size=220;
    const canvas=document.createElement("canvas");
    canvas.width=size; canvas.height=size;
    const ctx=canvas.getContext("2d");
    const cx=size/2,cy=size/2,r=96;

    const shadowGrad=ctx.createRadialGradient(cx+18,cy+28,20,cx+18,cy+28,r);
    shadowGrad.addColorStop(0,"rgba(98,32,9,.15)");
    shadowGrad.addColorStop(.7,"rgba(74,24,8,.22)");
    shadowGrad.addColorStop(1,"rgba(35,12,4,.58)");

    const grad=ctx.createRadialGradient(cx-32,cy-38,8,cx,cy,r);
    grad.addColorStop(0,"#ffc36a");
    grad.addColorStop(.28,"#f8903a");
    grad.addColorStop(.72,"#e55f24");
    grad.addColorStop(1,"#a93617");

    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();

    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();

    // Fine pebbled texture
    for(let i=0;i<1500;i++){
      const a=Math.random()*Math.PI*2;
      const rr=Math.sqrt(Math.random())*r;
      const x=cx+Math.cos(a)*rr;
      const y=cy+Math.sin(a)*rr;
      ctx.fillStyle=Math.random()>.5?"rgba(255,205,130,.18)":"rgba(80,20,5,.12)";
      ctx.beginPath();
      ctx.arc(x,y,Math.random()*1.3+.3,0,Math.PI*2);
      ctx.fill();
    }

    ctx.fillStyle=shadowGrad;
    ctx.fillRect(0,0,size,size);

    ctx.strokeStyle="#54210f";
    ctx.lineWidth=9;
    ctx.lineCap="round";

    ctx.beginPath();
    ctx.arc(cx,cy,r-5,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx-r,cy);
    ctx.bezierCurveTo(cx-30,cy-18,cx+30,cy+18,cx+r,cy);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx,cy-r);
    ctx.bezierCurveTo(cx-20,cy-38,cx+20,cy+38,cx,cy+r);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx-r*.72,cy-r*.7);
    ctx.bezierCurveTo(cx-10,cy-25,cx-10,cy+25,cx-r*.72,cy+r*.7);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx+r*.72,cy-r*.7);
    ctx.bezierCurveTo(cx+10,cy-25,cx+10,cy+25,cx+r*.72,cy+r*.7);
    ctx.stroke();

    // highlight
    const hi=ctx.createRadialGradient(cx-40,cy-45,2,cx-40,cy-45,42);
    hi.addColorStop(0,"rgba(255,255,255,.48)");
    hi.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=hi;
    ctx.fillRect(0,0,size,size);

    ctx.restore();
    this.textures.addCanvas("ballTexture",canvas);
  }

  drawBackground(){
    const g=this.add.graphics();
    g.fillGradientStyle(0x0f1532,0x0f1532,0x202b62,0x202b62,1);
    g.fillRect(0,0,W,H);

    // back panel and glowing rails
    g.fillStyle(0x121a41,1);
    g.fillRoundedRect(47,90,W-94,545,34);
    g.lineStyle(7,0x42dff5,.9);
    g.strokeRoundedRect(47,90,W-94,545,34);

    g.lineStyle(4,0xff6d9f,.75);
    g.lineBetween(18,165,75,205);
    g.lineBetween(75,205,75,645);
    g.lineBetween(W-18,165,W-75,205);
    g.lineBetween(W-75,205,W-75,645);

    // lane
    g.fillGradientStyle(0x4cb7e8,0xf188aa,0x2b6ba8,0xb04d83,1);
    g.fillTriangle(80,650,W-80,650,W/2,255);
    g.fillStyle(0xffffff,.08);
    g.fillTriangle(80,650,W/2,650,W/2,255);

    // side guards
    g.fillStyle(0x111735,1);
    g.fillRoundedRect(28,590,90,122,20);
    g.fillRoundedRect(W-118,590,90,122,20);
    g.fillStyle(0xff637d,.8);
    g.fillRoundedRect(39,604,7,88,4);
    g.fillRoundedRect(W-46,604,7,88,4);

    for(let i=0;i<30;i++){
      g.fillStyle(0xffffff,Phaser.Math.FloatBetween(.08,.4));
      g.fillCircle(Phaser.Math.Between(18,W-18),Phaser.Math.Between(80,390),Phaser.Math.Between(1,3));
    }
  }

  createHUD(){
    this.title=this.add.text(W/2,30,"BASKETBALL LETTERS",{
      fontFamily:"Arial",fontSize:"23px",fontStyle:"bold",color:"#ffffff",
      stroke:"#0c1128",strokeThickness:6
    }).setOrigin(.5);

    this.subtitle=this.add.text(W/2,62,"Tap the ball • Watch it swish",{
      fontFamily:"Arial",fontSize:"14px",fontStyle:"bold",color:"#c9f5ff"
    }).setOrigin(.5);

    const coin=this.add.graphics();
    coin.fillStyle(0xffffff,.96);
    coin.fillRoundedRect(W-96,16,80,42,21);
    coin.lineStyle(2,0xffffff,.5);
    coin.strokeRoundedRect(W-96,16,80,42,21);
    this.coinText=this.add.text(W-56,37,`⭐ ${this.coins}`,{
      fontFamily:"Arial",fontSize:"17px",fontStyle:"bold",color:"#111735"
    }).setOrigin(.5);

    const bg=this.add.graphics().setDepth(60);
    bg.fillStyle(0xffffff,.98);
    bg.fillRoundedRect(88,H-62,254,46,23);
    bg.lineStyle(2,0xffffff,.55);
    bg.strokeRoundedRect(88,H-62,254,46,23);
    this.message=this.add.text(W/2,H-39,"Tap the basketball!",{
      fontFamily:"Arial",fontSize:"17px",fontStyle:"bold",color:"#111735"
    }).setOrigin(.5).setDepth(61);
  }

  createHoop(){
    this.add.rectangle(W/2,185,146,92,0xe9f5ff,.97)
      .setStrokeStyle(8,0xffffff).setDepth(8);
    this.add.rectangle(W/2,201,52,35,0xffffff,0)
      .setStrokeStyle(4,0xff5d73).setDepth(9);

    this.add.rectangle(W/2+61,336,13,250,0x6d7899).setDepth(3);
    this.add.rectangle(W/2+61,465,115,17,0x4b5573).setDepth(3);

    this.add.ellipse(W/2,244,84,20,0xdd4a21)
      .setStrokeStyle(7,0xdd4a21).setDepth(12);

    this.net=this.add.graphics().setDepth(11);
    this.drawNet(1,0);

    this.frontRim=this.add.graphics().setDepth(26);
    this.frontRim.lineStyle(7,0xff6d31,1);
    this.frontRim.beginPath();
    this.frontRim.arc(W/2,246,42,0,Math.PI,false);
    this.frontRim.strokePath();
  }

  drawNet(stretch=1,sway=0){
    this.net.clear();
    const top=253,bottom=318+(stretch-1)*35;
    this.net.lineStyle(3,0xffffff,.96);
    this.net.lineBetween(W/2-31,top,W/2-18+sway,bottom);
    this.net.lineBetween(W/2+31,top,W/2+18+sway,bottom);
    this.net.lineBetween(W/2-18+sway,bottom,W/2+18+sway,bottom);
    for(let i=-24;i<=24;i+=12){
      this.net.lineBetween(W/2+i,top+3,W/2+i*.55+sway,bottom);
    }
    for(let y=267;y<bottom;y+=13){
      const p=(y-top)/(bottom-top);
      const width=29-(11*p);
      this.net.lineBetween(W/2-width+sway*p,y,W/2+width+sway*p,y);
    }
  }

  createPlayer(){
    this.player=this.add.container(W/2,570).setDepth(18);
    const shadow=this.add.ellipse(0,118,90,20,0x000000,.23);
    const legL=this.add.rectangle(-18,74,19,66,0x18203f).setOrigin(.5,0);
    const legR=this.add.rectangle(18,74,19,66,0x18203f).setOrigin(.5,0);
    const shoeL=this.add.ellipse(-20,143,38,15,0xffffff);
    const shoeR=this.add.ellipse(20,143,38,15,0xffffff);
    const torso=this.add.rectangle(0,18,70,88,0x705ce8).setStrokeStyle(4,0xffffff);
    this.add.rectangle;
    const stripe=this.add.rectangle(0,21,70,11,0x43d7ff);
    const num=this.add.text(0,18,"7",{fontFamily:"Arial",fontSize:"34px",fontStyle:"bold",color:"#fff"}).setOrigin(.5);
    this.leftArm=this.add.rectangle(-43,4,17,69,0x9a6234).setOrigin(.5,0).setAngle(20);
    this.rightArm=this.add.rectangle(43,4,17,69,0x9a6234).setOrigin(.5,0).setAngle(-20);
    const head=this.add.circle(0,-43,24,0x9a6234);
    const hair=this.add.arc(0,-53,25,200,340,false,0x20243e);
    this.player.add([shadow,legL,legR,shoeL,shoeR,torso,stripe,num,this.leftArm,this.rightArm,head,hair]);
  }

  createBall(){
    this.floorShadow=this.add.ellipse(W/2,540,105,28,0x000000,.25).setDepth(17);
    this.ball=this.add.container(W/2,465).setDepth(24);
    this.ballImage=this.add.image(0,0,"ballTexture").setDisplaySize(104,104);
    this.ballLetter=this.add.text(0,1,"A",{
      fontFamily:"Arial Rounded MT Bold, Arial",fontSize:"44px",fontStyle:"bold",
      color:"#ffffff",stroke:"#7a2b17",strokeThickness:6
    }).setOrigin(.5);
    this.ball.add([this.ballImage,this.ballLetter]);
    this.ball.setSize(110,110).setInteractive({useHandCursor:true});
    this.ball.on("pointerdown",()=>this.shoot());
  }

  createReveal(){
    this.overlay=this.add.rectangle(W/2,H/2,W,H,0x081022,0).setDepth(70).setVisible(false);
    this.letterShadow=this.add.text(W/2+9,H/2+12,"A",{
      fontFamily:"Arial Rounded MT Bold, Arial",fontSize:"185px",fontStyle:"bold",
      color:"#681c39",stroke:"#ffffff",strokeThickness:15
    }).setOrigin(.5).setDepth(81).setAlpha(0);
    this.letter=this.add.text(W/2,H/2,"A",{
      fontFamily:"Arial Rounded MT Bold, Arial",fontSize:"185px",fontStyle:"bold",
      color:"#ff6b6b",stroke:"#ffffff",strokeThickness:15
    }).setOrigin(.5).setDepth(82).setAlpha(0);
  }

  createMenu(){
    const shade=this.add.rectangle(W/2,H/2,W,H,0x0b1028,.88).setDepth(100);

    const panel=this.add.graphics().setDepth(101);
    panel.fillStyle(0xffffff,1);
    panel.fillRoundedRect(38,140,W-76,470,30);
    panel.lineStyle(2,0xffffff,.6);
    panel.strokeRoundedRect(38,140,W-76,470,30);

    const glow=this.add.graphics().setDepth(100);
    glow.fillStyle(0x4dabf7,.18);
    glow.fillCircle(W/2,215,92);

    const icon=this.add.image(W/2,215,"ballTexture").setDisplaySize(130,130).setDepth(102);

    const title=this.add.text(W/2,310,"Basketball Letters",{
      fontFamily:"Arial",fontSize:"31px",fontStyle:"bold",color:"#111735"
    }).setOrigin(.5).setDepth(102);

    const body=this.add.text(W/2,380,"Tap the letter ball.\nWatch it go through the net.\nLearn A through Z in order.",{
      fontFamily:"Arial",fontSize:"18px",fontStyle:"bold",align:"center",
      color:"#4c5677",lineSpacing:10
    }).setOrigin(.5).setDepth(102);

    const soundPill=this.add.graphics().setDepth(102);
    soundPill.fillStyle(0xf0f5ff,1);
    soundPill.fillRoundedRect(92,448,246,44,22);
    const soundText=this.add.text(W/2,470,"🔊 Friendly voice enabled",{
      fontFamily:"Arial",fontSize:"15px",fontStyle:"bold",color:"#34405f"
    }).setOrigin(.5).setDepth(103);

    const buttonShadow=this.add.graphics().setDepth(102);
    buttonShadow.fillStyle(0xb83c54,.28);
    buttonShadow.fillRoundedRect(72,523,286,64,20);

    const button=this.add.graphics().setDepth(103);
    button.fillGradientStyle(0xff7a77,0xff7a77,0xf05469,0xf05469,1);
    button.fillRoundedRect(72,515,286,64,20);
    button.setInteractive(new Phaser.Geom.Rectangle(72,515,286,64),Phaser.Geom.Rectangle.Contains);

    const label=this.add.text(W/2,547,"START PLAYING",{
      fontFamily:"Arial",fontSize:"20px",fontStyle:"bold",color:"#ffffff"
    }).setOrigin(.5).setDepth(104);

    button.on("pointerdown",()=>{
      // Prime iOS speech during a direct user gesture.
      speak("Let's play!",{rate:1.0,pitch:1.22});
      [shade,panel,glow,icon,title,body,soundPill,soundText,buttonShadow,button,label].forEach(x=>x.destroy());
      this.prepare();
    });
  }

  prepare(){
    this.locked=false;
    const letter=String.fromCharCode(65+(this.index%26));
    const color=COLORS[this.index%COLORS.length];

    this.ballLetter.setText(letter);
    this.letter.setText(letter).setColor("#"+color.toString(16).padStart(6,"0"));
    this.letterShadow.setText(letter);

    this.ball.setPosition(W/2,465).setScale(1).setAlpha(1).setAngle(0).setDepth(24);
    this.ballImage.setAngle(0);
    this.ballLetter.setAngle(0);
    this.floorShadow.setPosition(W/2,540).setScale(1).setAlpha(.25);

    this.player.setPosition(W/2,570).setScale(1);
    this.leftArm.setAngle(20);
    this.rightArm.setAngle(-20);
    this.message.setText(`Tap the ${letter} ball!`);
  }

  shoot(){
    if(this.locked) return;
    this.locked=true;
    const letter=String.fromCharCode(65+(this.index%26));
    this.message.setText("Here it goes!");

    this.tweens.add({
      targets:this.floorShadow,scaleX:.62,scaleY:.62,alpha:.1,duration:900,ease:"Sine.Out"
    });

    this.tweens.add({
      targets:this.player,y:590,scaleY:.95,duration:150,yoyo:true,
      onComplete:()=>{
        this.tweens.add({targets:this.player,y:525,duration:270,yoyo:true,hold:190,ease:"Sine.Out"});
        this.tweens.add({targets:[this.leftArm,this.rightArm],angle:0,duration:220});
      }
    });

    const path=new Phaser.Curves.CubicBezier(
      new Phaser.Math.Vector2(W/2,465),
      new Phaser.Math.Vector2(135,238),
      new Phaser.Math.Vector2(298,126),
      new Phaser.Math.Vector2(W/2,240)
    );
    const follow={t:0};

    this.tweens.add({
      targets:follow,t:1,duration:1080,ease:"Sine.InOut",
      onUpdate:()=>{
        const p=path.getPoint(follow.t);
        this.ball.setPosition(p.x,p.y);

        // True visual backspin: textured ball rotates counter-clockwise.
        this.ballImage.angle-=10;
        this.ballLetter.angle-=10;

        const s=1-follow.t*.34;
        this.ball.setScale(s);
      },
      onComplete:()=>this.swish(letter)
    });
  }

  swish(letter){
    this.ball.setDepth(10);
    this.message.setText("SWISH!");

    this.tweens.addCounter({
      from:1,to:1.52,duration:220,yoyo:true,
      onUpdate:t=>{
        const sway=Math.sin(t.progress*Math.PI)*7;
        this.drawNet(t.getValue(),sway);
      }
    });

    this.tweens.add({
      targets:this.ball,y:322,scale:.5,alpha:.88,duration:350,ease:"Quad.In",
      onUpdate:()=>{
        this.ballImage.angle-=13;
        this.ballLetter.angle-=13;
      },
      onComplete:()=>{
        this.ball.setAlpha(0);
        this.cameras.main.shake(90,.0025);
        this.time.delayedCall(120,()=>this.celebrate(letter));
      }
    });
  }

  celebrate(letter){
    this.coins++;
    this.coinText.setText(`⭐ ${this.coins}`);
    localStorage.setItem("letterQuestCoinsV2",this.coins);

    this.overlay.setVisible(true).setAlpha(0);
    this.tweens.add({targets:this.overlay,alpha:.72,duration:180});

    this.letter.setPosition(W/2,265).setScale(.1).setAlpha(1).setAngle(-25);
    this.letterShadow.setPosition(W/2+8,276).setScale(.1).setAlpha(.32).setAngle(-25);

    const swirl={t:0};
    this.tweens.add({
      targets:swirl,t:1,duration:760,ease:"Back.Out",
      onUpdate:()=>{
        const t=swirl.t;
        const a=t*Math.PI*2.15;
        const radius=(1-t)*52;
        const x=W/2+Math.cos(a)*radius;
        const y=265+(H/2-265)*t+Math.sin(a)*radius*.32;
        const scale=.1+t*1.02;
        const angle=-25+25*t+Math.sin(a)*5;
        this.letter.setPosition(x,y).setScale(scale).setAngle(angle);
        this.letterShadow.setPosition(x+9,y+12).setScale(scale).setAngle(angle);
      },
      onComplete:()=>{
        this.tweens.add({targets:[this.letter,this.letterShadow],scale:1.18,duration:130,yoyo:true});
      }
    });

    this.confetti();
    this.sparkles();

    // Speech begins during the visible letter pop.
    this.time.delayedCall(240,()=>{
      speak(`This is the letter ${letter}!`,{rate:.9,pitch:1.26});
    });

    this.time.delayedCall(2050,()=>{
      this.tweens.add({
        targets:[this.letter,this.letterShadow],alpha:0,scale:1.28,y:H/2-35,duration:340,
        onComplete:()=>{
          this.overlay.setVisible(false);
          this.index=(this.index+1)%26;
          this.prepare();
        }
      });
    });
  }

  confetti(){
    const colors=[0xff5d73,0xffd43b,0x4dabf7,0x69db7c,0xb197fc,0xff922b,0x38d9a9];
    for(let i=0;i<76;i++){
      const p=this.add.rectangle(
        W/2+Phaser.Math.Between(-22,22),
        H/2+Phaser.Math.Between(-22,22),
        Phaser.Math.Between(7,12),
        Phaser.Math.Between(13,23),
        Phaser.Utils.Array.GetRandom(colors)
      ).setDepth(78).setAngle(Phaser.Math.Between(0,180));

      const d=Phaser.Math.Between(140,360);
      const a=Phaser.Math.FloatBetween(0,Math.PI*2);

      this.tweens.add({
        targets:p,
        x:p.x+Math.cos(a)*d,
        y:p.y+Math.sin(a)*d+130,
        angle:p.angle+Phaser.Math.Between(360,980),
        alpha:0,
        duration:Phaser.Math.Between(900,1500),
        ease:"Quad.Out",
        onComplete:()=>p.destroy()
      });
    }
  }

  sparkles(){
    for(let i=0;i<20;i++){
      const s=this.add.star(
        W/2+Phaser.Math.Between(-95,95),
        H/2+Phaser.Math.Between(-120,120),
        5,4,10,0xffffff,1
      ).setDepth(80).setScale(.15).setAlpha(0);

      this.tweens.add({
        targets:s,scale:Phaser.Math.FloatBetween(.7,1.25),alpha:1,angle:180,
        duration:260,yoyo:true,hold:Phaser.Math.Between(120,450),
        onComplete:()=>s.destroy()
      });
    }
  }
}

new Phaser.Game({
  type:Phaser.AUTO,
  parent:"game",
  width:W,
  height:H,
  backgroundColor:"#10162f",
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  render:{antialias:true,pixelArt:false,roundPixels:false},
  scene:[GameScene]
});
</script>
</body>
</html>
