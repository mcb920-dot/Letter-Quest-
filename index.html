<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#111827">
<title>Letter Quest</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f172a;--panel:#1e293b;--text:#f8fafc;--muted:#cbd5e1;--accent:#f59e0b;--good:#22c55e}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#0f172a,#172554);color:var(--text);min-height:100vh}
button{font:inherit}
#app{max-width:560px;margin:auto;min-height:100vh;padding:18px}
.screen{display:none}.screen.active{display:block}
.brand{display:flex;align-items:center;gap:14px;margin:8px 0 20px}
.brand h1{margin:0;font-size:32px}.brand p{margin:3px 0 0;color:var(--muted)}
.logo-ball{width:68px;height:68px;border-radius:50%;display:grid;place-items:center;background:#f97316;border:4px solid #fff;font-size:30px;font-weight:900;box-shadow:inset 0 0 0 3px #111827}
.stat-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.stat-bar>div{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:12px;text-align:center}
.stat-bar span{display:block;font-size:24px}.stat-bar strong{display:block;font-size:24px}.stat-bar small{color:var(--muted)}
h2{margin:12px 0}.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.game-card{border:0;border-radius:22px;min-height:160px;padding:18px;color:#fff;text-align:left;box-shadow:0 8px 24px rgba(0,0,0,.28);display:flex;flex-direction:column;justify-content:flex-end}
.game-card .emoji{font-size:48px;margin-bottom:auto}.game-card strong{font-size:20px}.game-card small{opacity:.9;margin-top:5px}
.basketball{background:linear-gradient(145deg,#f97316,#c2410c)}
.truck{background:linear-gradient(145deg,#84cc16,#3f6212)}
.robot{background:linear-gradient(145deg,#06b6d4,#155e75)}
.space{background:linear-gradient(145deg,#8b5cf6,#4c1d95)}
.secondary-btn,.tiny-btn{width:100%;margin-top:14px;border:0;border-radius:16px;padding:14px;background:#e2e8f0;color:#0f172a;font-weight:800}
.tiny-btn{background:transparent;color:#94a3b8;font-size:13px;padding:10px}
.game-header{display:grid;grid-template-columns:50px 1fr auto;align-items:center;gap:10px}
.game-header h2{margin:0}.game-header p{margin:3px 0 0;color:var(--muted);font-size:14px}
.icon-btn{width:44px;height:44px;border-radius:14px;border:0;font-size:26px;background:#334155;color:white}
.coin-pill{background:#334155;border-radius:999px;padding:10px 14px;font-weight:800}
.target-panel{text-align:center;margin:18px 0 12px}.target-panel small{color:var(--muted);text-transform:uppercase;font-weight:700}
#targetLetter{font-size:74px;font-weight:900;line-height:1;margin:4px 0}
.speak-btn{border:0;border-radius:999px;padding:9px 15px;background:#f8fafc;color:#0f172a;font-weight:800}
.game-stage{min-height:390px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:26px;padding:16px;position:relative;overflow:hidden}
.option-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;height:100%}
.letter-option{border:0;border-radius:22px;background:#f8fafc;color:#0f172a;font-size:52px;font-weight:900;min-height:145px;position:relative}
.letter-option:active{transform:scale(.97)}
.basket-hoop:after{content:"🏀";display:block;font-size:42px;margin-top:6px}
.truck-gate:before{content:"🏎️";display:block;font-size:44px;margin-bottom:4px}
.robot-target:before{content:"🤖";display:block;font-size:48px;margin-bottom:4px}
.space-node:before{content:"✨";display:block;font-size:44px;margin-bottom:4px}
.correct{animation:pop .45s ease;background:#86efac!important}
.wrong{animation:shake .35s ease;background:#fca5a5!important}
@keyframes pop{50%{transform:scale(1.08)}}@keyframes shake{25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-5px)}}
.game-footer{padding:14px 4px;text-align:center}.feedback{font-size:18px;font-weight:800;min-height:26px}
.progress-track{height:12px;background:#334155;border-radius:999px;margin:10px 0;overflow:hidden}.progress-track div{height:100%;width:0;background:#22c55e;transition:.3s}
.reward-list{display:grid;gap:12px;margin-top:18px}
.reward-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:16px;display:grid;grid-template-columns:58px 1fr auto;gap:12px;align-items:center}
.reward-icon{font-size:40px}.reward-card h3{margin:0 0 4px}.reward-card p{margin:0;color:var(--muted);font-size:14px}.locked{opacity:.55}
.celebration{position:fixed;inset:0;background:rgba(15,23,42,.9);display:grid;place-items:center;padding:20px;z-index:5}
.hidden{display:none}.celebration-card{width:min(420px,100%);background:#fff;color:#0f172a;border-radius:26px;padding:28px;text-align:center}
.big-star{font-size:72px}.celebration-card h2{font-size:32px}.celebration-card button{width:100%;border:0;border-radius:16px;padding:14px;margin-top:10px;background:#f59e0b;color:#111827;font-weight:900}.celebration-card .secondary-btn{background:#e2e8f0}
@media(max-width:390px){#app{padding:12px}.game-card{min-height:145px}.game-stage{min-height:350px}.letter-option{min-height:130px}}
</style>
</head>
<body>
<main id="app">
<section id="home" class="screen active">
<div class="brand"><div class="logo-ball">A</div><div><h1>Letter Quest</h1><p>Play. Learn. Unlock.</p></div></div>
<div class="stat-bar">
<div><span>⭐</span><strong id="coinCount">0</strong><small>Coins</small></div>
<div><span>🔥</span><strong id="streakCount">0</strong><small>Streak</small></div>
<div><span>🏆</span><strong id="bestCount">0</strong><small>Best</small></div>
</div>
<h2>Choose a game</h2>
<div class="game-grid">
<button class="game-card basketball" data-game="basketball"><span class="emoji">🏀</span><strong>Basketball</strong><small>Shoot the right letter</small></button>
<button class="game-card truck" data-game="truck"><span class="emoji">🏁</span><strong>Monster Truck</strong><small>Drive through the right gate</small></button>
<button class="game-card robot" data-game="robot"><span class="emoji">🤖</span><strong>Robot Range</strong><small>Foam-dart the right robot</small></button>
<button class="game-card space" data-game="space"><span class="emoji">🚀</span><strong>Space Order</strong><small>Fly through A, B, C...</small></button>
</div>
<button id="openRewards" class="secondary-btn">🎁 Rewards & Unlocks</button>
<button id="resetProgress" class="tiny-btn">Reset progress</button>
</section>

<section id="game" class="screen">
<header class="game-header">
<button id="backBtn" class="icon-btn">←</button>
<div><h2 id="gameTitle">Game</h2><p id="gameInstruction">Find the letter</p></div>
<div class="coin-pill">⭐ <span id="gameCoins">0</span></div>
</header>
<div class="target-panel"><small>Find</small><div id="targetLetter">A</div><button id="speakBtn" class="speak-btn">🔊 Hear it</button></div>
<div id="gameStage" class="game-stage"></div>
<div class="game-footer"><div id="feedback" class="feedback">You’ve got this!</div><div class="progress-track"><div id="roundProgress"></div></div><small id="roundText">Round 1 of 10</small></div>
</section>

<section id="rewards" class="screen">
<header class="game-header">
<button id="rewardsBack" class="icon-btn">←</button>
<div><h2>Rewards</h2><p>Coins unlock cool gear</p></div>
<div class="coin-pill">⭐ <span id="rewardCoins">0</span></div>
</header>
<div id="rewardList" class="reward-list"></div>
</section>

<div id="celebration" class="celebration hidden">
<div class="celebration-card"><div class="big-star">⭐</div><h2>Great job!</h2><p id="celebrationText"></p><button id="playAgainBtn">Play Again</button><button id="homeBtn" class="secondary-btn">Home</button></div>
</div>
</main>

<script>
const screens={home:document.getElementById("home"),game:document.getElementById("game"),rewards:document.getElementById("rewards")};
const state={coins:Number(localStorage.getItem("lq_coins")||0),streak:Number(localStorage.getItem("lq_streak")||0),best:Number(localStorage.getItem("lq_best")||0),currentGame:"basketball",round:1,totalRounds:10,correctThisRun:0,target:"A",spaceIndex:0};
const gameNames={basketball:["Basketball","Shoot the hoop with the right letter"],truck:["Monster Truck","Drive through the right letter gate"],robot:["Robot Range","Foam-dart the right robot"],space:["Space Order","Fly through the letters in order"]};
const rewards=[{icon:"🏀",name:"Blue Basketball",cost:20},{icon:"🔥",name:"Flame Truck Paint",cost:50},{icon:"🤖",name:"Gold Robot",cost:90},{icon:"🚀",name:"Galaxy Rocket",cost:140},{icon:"👑",name:"Letter Champion Crown",cost:220}];
function save(){localStorage.setItem("lq_coins",state.coins);localStorage.setItem("lq_streak",state.streak);localStorage.setItem("lq_best",state.best)}
function updateStats(){coinCount.textContent=state.coins;streakCount.textContent=state.streak;bestCount.textContent=state.best;gameCoins.textContent=state.coins;rewardCoins.textContent=state.coins}
function showScreen(name){Object.values(screens).forEach(s=>s.classList.remove("active"));screens[name].classList.add("active");if(name==="rewards")renderRewards()}
function speak(text){if(!("speechSynthesis"in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=.8;u.pitch=1.1;speechSynthesis.speak(u)}
function randomLetter(){return String.fromCharCode(65+Math.floor(Math.random()*26))}
function uniqueOptions(target){const set=new Set([target]);while(set.size<4)set.add(randomLetter());return[...set].sort(()=>Math.random()-.5)}
function startGame(type){state.currentGame=type;state.round=1;state.correctThisRun=0;state.spaceIndex=0;gameTitle.textContent=gameNames[type][0];gameInstruction.textContent=gameNames[type][1];feedback.textContent="You’ve got this!";showScreen("game");nextRound()}
function nextRound(){if(state.round>state.totalRounds){finishGame();return}state.target=state.currentGame==="space"?String.fromCharCode(65+state.spaceIndex):randomLetter();targetLetter.textContent=state.target;roundText.textContent=`Round ${state.round} of ${state.totalRounds}`;roundProgress.style.width=`${((state.round-1)/state.totalRounds)*100}%`;renderStage();setTimeout(()=>speak(state.currentGame==="space"?`Find ${state.target}. What comes next?`:`Find the letter ${state.target}`),250)}
function renderStage(){gameStage.innerHTML="";const grid=document.createElement("div");grid.className="option-grid";uniqueOptions(state.target).forEach(letter=>{const btn=document.createElement("button");btn.className="letter-option";if(state.currentGame==="basketball")btn.classList.add("basket-hoop");if(state.currentGame==="truck")btn.classList.add("truck-gate");if(state.currentGame==="robot")btn.classList.add("robot-target");if(state.currentGame==="space")btn.classList.add("space-node");btn.innerHTML=`<span>${letter}</span>`;btn.onclick=()=>choose(letter,btn);grid.appendChild(btn)});gameStage.appendChild(grid)}
function choose(letter,btn){const buttons=[...document.querySelectorAll(".letter-option")];buttons.forEach(b=>b.disabled=true);if(letter===state.target){btn.classList.add("correct");state.coins+=2;state.streak++;state.correctThisRun++;state.best=Math.max(state.best,state.streak);if(state.currentGame==="space")state.spaceIndex=(state.spaceIndex+1)%26;feedback.textContent=`Yes! ${letter} is correct! +2 ⭐`;speak(`Great job! ${letter} is correct.`)}else{btn.classList.add("wrong");state.streak=0;feedback.textContent=`Good try. The answer was ${state.target}.`;speak(`Good try. The letter was ${state.target}.`);const right=buttons.find(b=>b.textContent.trim()===state.target);if(right)right.classList.add("correct")}state.round++;save();updateStats();setTimeout(nextRound,1100)}
function finishGame(){roundProgress.style.width="100%";celebrationText.textContent=`You got ${state.correctThisRun} out of ${state.totalRounds} correct and earned ${state.correctThisRun*2} coins!`;celebration.classList.remove("hidden");speak("Great job! You finished the game!")}
function renderRewards(){rewardList.innerHTML="";rewards.forEach(r=>{const unlocked=state.coins>=r.cost;const card=document.createElement("div");card.className=`reward-card ${unlocked?"":"locked"}`;card.innerHTML=`<div class="reward-icon">${r.icon}</div><div><h3>${r.name}</h3><p>Unlocks at ${r.cost} coins</p></div><div><strong>${unlocked?"Unlocked":`🔒 ${r.cost}`}</strong></div>`;rewardList.appendChild(card)})}
document.querySelectorAll(".game-card").forEach(btn=>btn.onclick=()=>startGame(btn.dataset.game));
backBtn.onclick=()=>showScreen("home");openRewards.onclick=()=>showScreen("rewards");rewardsBack.onclick=()=>showScreen("home");speakBtn.onclick=()=>speak(`Find the letter ${state.target}`);
playAgainBtn.onclick=()=>{celebration.classList.add("hidden");startGame(state.currentGame)};homeBtn.onclick=()=>{celebration.classList.add("hidden");showScreen("home")};
resetProgress.onclick=()=>{if(confirm("Reset all coins and progress?")){state.coins=0;state.streak=0;state.best=0;save();updateStats()}};
updateStats();
</script>
</body>
</html>
