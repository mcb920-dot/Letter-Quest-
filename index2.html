<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Letter Quest — Learn Letters</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(#76c9ff 0 46%,#efbd76 46% 100%);min-height:100vh;overflow:hidden;color:#10233f}
button{font:inherit}
#app{max-width:560px;margin:auto;min-height:100vh;position:relative;overflow:hidden}
.topbar{display:grid;grid-template-columns:48px 1fr auto;gap:10px;align-items:center;padding:14px}
.back{border:0;border-radius:14px;width:44px;height:44px;font-size:24px;background:#fff;color:#10233f;box-shadow:0 4px 10px #0002}
.title{text-align:center}.title h1{margin:0;font-size:23px}.title p{margin:3px 0 0;font-size:13px}
.coins{background:#fff;border-radius:999px;padding:10px 14px;font-weight:900;box-shadow:0 4px 10px #0002}
.prompt{text-align:center;margin-top:4px}
.prompt h2{margin:0;font-size:24px}.prompt p{margin:5px 0 0;font-weight:700}
.court{position:absolute;left:0;right:0;top:135px;bottom:0}
.cloud{position:absolute;background:#fff;border-radius:999px;opacity:.82}
.cloud.c1{width:110px;height:34px;left:26px;top:20px}
.cloud.c2{width:135px;height:38px;right:18px;top:54px}
.crowd{position:absolute;left:0;right:0;top:150px;height:72px;background:repeating-linear-gradient(90deg,#253858 0 8px,#f05b5b 8px 16px,#ffd166 16px 24px,#3fb984 24px 32px);border-top:8px solid #d6dce5;border-bottom:8px solid #1d3557}
.floor{position:absolute;left:0;right:0;top:222px;bottom:0;background:linear-gradient(#d99b4b,#efc375)}
.floor:before{content:"";position:absolute;left:50%;top:0;bottom:0;width:4px;background:#fff8;transform:translateX(-50%)}
.floor:after{content:"";position:absolute;width:200px;height:100px;border:5px solid #fff8;border-radius:200px 200px 0 0;left:50%;transform:translateX(-50%);bottom:-5px}
.goal{position:absolute;top:68px;left:50%;transform:translateX(-50%);width:160px;height:220px}
.backboard{position:absolute;top:0;left:50%;transform:translateX(-50%);width:132px;height:82px;background:#eef8ff;border:7px solid #fff;box-shadow:0 4px 10px #0003}
.backboard:after{content:"";position:absolute;width:46px;height:31px;border:4px solid #e44;left:50%;top:27px;transform:translateX(-50%)}
.rim{position:absolute;top:81px;left:50%;transform:translateX(-50%);width:72px;height:13px;border:7px solid #f05a28;border-radius:50%}
.net{position:absolute;top:94px;left:50%;transform:translateX(-50%);width:52px;height:55px;border-left:3px solid #fff;border-right:3px solid #fff;border-bottom:3px solid #fff;border-radius:0 0 26px 26px}
.player{position:absolute;left:50%;bottom:38px;transform:translateX(-50%);width:96px;height:158px;z-index:5}
.head{position:absolute;width:44px;height:44px;border-radius:50%;background:#8b5a2b;left:26px;top:0}
.body{position:absolute;width:62px;height:74px;border-radius:18px 18px 8px 8px;background:#2447d8;left:17px;top:38px;border:4px solid #fff}
.body:after{content:"7";position:absolute;color:#fff;font-size:31px;font-weight:900;left:50%;top:14px;transform:translateX(-50%)}
.leg{position:absolute;width:18px;height:54px;background:#1f2937;top:105px;border-radius:10px}.leg.l{left:23px}.leg.r{right:23px}
.arm{position:absolute;width:16px;height:62px;background:#8b5a2b;top:48px;border-radius:12px;transform-origin:top}.arm.l{left:8px;transform:rotate(18deg)}.arm.r{right:8px;transform:rotate(-18deg)}
.ball-button{position:absolute;left:50%;bottom:186px;transform:translateX(-50%);width:92px;height:92px;border-radius:50%;border:4px solid #4d2a0a;background:radial-gradient(circle at 35% 30%,#ffb14a 0 24%,#f27916 25% 100%);z-index:8;box-shadow:0 7px 14px #0004;display:grid;place-items:center;font-size:50px;font-weight:1000;color:#fff;text-shadow:0 3px 0 #7a3500}
.ball-button:before,.ball-button:after{content:"";position:absolute;inset:8px;border:3px solid #4d2a0a;border-radius:50%;pointer-events:none}
.ball-button:after{transform:rotate(90deg)}
.ball-button span{position:relative;z-index:2}
.ball-button:active{transform:translateX(-50%) scale(.94)}
.tap-note{position:absolute;left:50%;bottom:112px;transform:translateX(-50%);background:#fff;border-radius:999px;padding:10px 18px;font-weight:900;box-shadow:0 6px 14px #0003;white-space:nowrap}
.shoot{animation:shoot 1.05s cubic-bezier(.2,.75,.25,1) forwards}
@keyframes shoot{
0%{left:50%;bottom:186px;transform:translateX(-50%) scale(1)}
45%{left:50%;bottom:470px;transform:translateX(-50%) scale(.86)}
82%{left:50%;bottom:352px;transform:translateX(-50%) scale(.72)}
100%{left:50%;bottom:300px;transform:translateX(-50%) scale(.66)}
}
.zoom-ball{position:fixed!important;left:50%!important;top:50%!important;bottom:auto!important;transform:translate(-50%,-50%) scale(3.2)!important;transition:.45s ease;z-index:60!important}
.flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:55}
.flash.on{animation:flash .55s ease}
@keyframes flash{20%{opacity:.75}100%{opacity:0}}
.confetti{position:fixed;width:10px;height:18px;top:-30px;z-index:70;animation:fall 1.35s linear forwards}
@keyframes fall{to{transform:translateY(800px) rotate(760deg);opacity:.2}}
.letter-banner{position:fixed;left:50%;top:72%;transform:translate(-50%,-50%) scale(.7);background:#fff;border-radius:24px;padding:16px 24px;font-size:30px;font-weight:1000;z-index:75;opacity:0;box-shadow:0 10px 30px #0004}
.letter-banner.show{animation:banner 1.25s ease forwards}
@keyframes banner{20%{opacity:1;transform:translate(-50%,-50%) scale(1.05)}75%{opacity:1}100%{opacity:0;transform:translate(-50%,-60%) scale(1)}}
.start-overlay{position:fixed;inset:0;background:#10233fee;display:grid;place-items:center;padding:24px;z-index:90}
.start-card{background:#fff;border-radius:28px;padding:28px;text-align:center;max-width:390px}
.start-card h2{font-size:34px;margin:8px}.start-card p{font-size:18px;line-height:1.4}
.start-card button{width:100%;border:0;border-radius:18px;padding:16px;background:#f58220;color:white;font-weight:1000;font-size:20px}
.hidden{display:none}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <button class="back" onclick="location.reload()">↻</button>
    <div class="title"><h1>Learn the Letters</h1><p>Tap the ball and shoot</p></div>
    <div class="coins">⭐ <span id="coins">0</span></div>
  </div>

  <div class="prompt">
    <h2>Ready to learn?</h2>
    <p>Tap the basketball!</p>
  </div>

  <div class="court">
    <div class="cloud c1"></div><div class="cloud c2"></div>
    <div class="crowd"></div>
    <div class="floor"></div>

    <div class="goal">
      <div class="backboard"></div>
      <div class="rim"></div>
      <div class="net"></div>
    </div>

    <div class="player">
      <div class="head"></div><div class="body"></div>
      <div class="arm l"></div><div class="arm r"></div>
      <div class="leg l"></div><div class="leg r"></div>
    </div>

    <button class="ball-button" id="ball"><span id="ballLetter">A</span></button>
    <div class="tap-note" id="tapNote">Tap the ball to shoot!</div>
  </div>
</div>

<div class="flash" id="flash"></div>
<div class="letter-banner" id="banner">This is the letter A!</div>

<div class="start-overlay" id="startOverlay">
  <div class="start-card">
    <div style="font-size:72px">🏀</div>
    <h2>Learn the Letters</h2>
    <p>Tap each basketball, watch it swish, and hear the letter out loud.</p>
    <button id="startBtn">Start Playing</button>
  </div>
</div>

<script>
let coins = Number(localStorage.getItem("learn_letter_coins") || 0);
let index = 0;
let locked = false;
const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
const $ = id => document.getElementById(id);

function pickFriendlyVoice(){
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    /Samantha|Ava|Allison|Susan|Karen|Moira|Tessa|female/i.test(v.name) &&
    /^en/i.test(v.lang)
  );
  return preferred || voices.find(v => /^en-US/i.test(v.lang)) || voices[0];
}

function speakLetter(letter){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(`This is the letter ${letter}. ${letter}!`);
  u.rate = 0.72;
  u.pitch = 1.22;
  u.volume = 1;
  const voice = pickFriendlyVoice();
  if(voice) u.voice = voice;
  speechSynthesis.speak(u);
}

function confetti(){
  const colors=["#ff4d4d","#ffd43b","#4dabf7","#69db7c","#b197fc","#ff922b"];
  for(let i=0;i<42;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"%";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDelay=Math.random()*.28+"s";
    c.style.transform=`rotate(${Math.random()*180}deg)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1700);
  }
}

function prepareLetter(){
  locked = false;
  const letter = alphabet[index % alphabet.length];
  $("ballLetter").textContent = letter;
  $("ball").className = "ball-button";
  $("tapNote").textContent = "Tap the ball to shoot!";
}

function shoot(){
  if(locked) return;
  locked = true;
  const letter = alphabet[index % alphabet.length];
  $("tapNote").textContent = "Here it goes!";
  $("ball").classList.add("shoot");

  setTimeout(()=>{
    $("tapNote").textContent = "SWISH!";
  },760);

  setTimeout(()=>{
    $("ball").classList.add("zoom-ball");
    $("flash").classList.add("on");
    $("banner").textContent = `This is the letter ${letter}!`;
    $("banner").classList.add("show");
    confetti();
    speakLetter(letter);
    coins += 1;
    $("coins").textContent = coins;
    localStorage.setItem("learn_letter_coins", coins);
  },1020);

  setTimeout(()=>{
    $("flash").classList.remove("on");
    $("banner").classList.remove("show");
    index = (index + 1) % alphabet.length;
    prepareLetter();
  },2550);
}

$("ball").onclick = shoot;
$("startBtn").onclick = ()=>{
  $("startOverlay").classList.add("hidden");
  $("coins").textContent = coins;
  prepareLetter();
  setTimeout(()=>speakLetter(alphabet[index]),300);
};

speechSynthesis.onvoiceschanged = ()=>pickFriendlyVoice();
</script>
</body>
</html>
