<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<meta name="theme-color" content="#101828" />
<title>Letter Quest Basketball</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#101828;font-family:Arial,Helvetica,sans-serif}
  #game{width:100%;height:100%}
  canvas{display:block;margin:0 auto}
  .loading{
    position:fixed;inset:0;display:grid;place-items:center;background:#101828;color:white;
    font-weight:900;font-size:20px;z-index:10
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
</head>
<body>
<div id="loading" class="loading">Loading Basketball Letters…</div>
<div id="game"></div>

<script>
const W = 430, H = 760;

function chooseVoice(){
  const voices = speechSynthesis.getVoices();
  const preferredNames = ["Samantha","Ava","Allison","Joelle","Karen","Tessa","Moira","Susan"];
  for (const n of preferredNames){
    const v = voices.find(x => x.name.includes(n) && x.lang.startsWith("en"));
    if (v) return v;
  }
  return voices.find(v => v.lang === "en-US") || voices.find(v => v.lang.startsWith("en")) || voices[0];
}
function sayLetter(letter){
  if (!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(`This is ${letter}!`);
  u.rate = 0.9;
  u.pitch = 1.28;
  u.volume = 1;
  const v = chooseVoice();
  if (v) u.voice = v;
  speechSynthesis.speak(u);
}

class MainScene extends Phaser.Scene {
  constructor(){ super("main"); }

  create(){
    document.getElementById("loading").style.display = "none";
    this.index = 0;
    this.locked = false;
    this.coins = Number(localStorage.getItem("lq_phaser_coins") || 0);

    this.drawBackground();
    this.drawUI();
    this.createHoop();
    this.createPlayer();
    this.createBall();
    this.createLetterReveal();
    this.createStartCard();

    speechSynthesis.onvoiceschanged = () => chooseVoice();
  }

  drawBackground(){
    const g = this.add.graphics();
    g.fillGradientStyle(0x73c9ff,0x73c9ff,0xbbe8ff,0xbbe8ff,1);
    g.fillRect(0,0,W,360);

    // clouds
    g.fillStyle(0xffffff,0.92);
    g.fillRoundedRect(24,110,112,28,14);
    g.fillCircle(48,110,20); g.fillCircle(82,102,24); g.fillCircle(112,112,18);
    g.fillRoundedRect(286,145,120,30,15);
    g.fillCircle(312,145,18); g.fillCircle(348,135,25); g.fillCircle(382,147,17);

    // arena stands
    g.fillStyle(0xe8edf3,1); g.fillRect(0,230,W,12);
    const crowdColors=[0x253858,0xef5f5f,0xffd166,0x4fc28a];
    for(let x=0;x<W;x+=8){
      g.fillStyle(crowdColors[(x/8)%crowdColors.length],1);
      g.fillRect(x,242,8,70);
    }
    g.fillStyle(0x18304f,1); g.fillRect(0,312,W,10);

    // court
    g.fillGradientStyle(0xd99a49,0xd99a49,0xf0c47b,0xf0c47b,1);
    g.fillRect(0,322,W,H-322);
    g.lineStyle(4,0xffffff,0.45);
    g.lineBetween(W/2,322,W/2,H);
    g.strokeCircle(W/2,H+40,115);
    g.strokeRoundedRect(120,560,190,120,24);
  }

  drawUI(){
    this.add.text(W/2,22,"LEARN THE LETTERS",{
      fontFamily:"Arial",fontSize:"24px",fontStyle:"bold",color:"#10233f"
    }).setOrigin(.5,0);

    this.add.text(W/2,55,"Tap the ball. Watch it swish.",{
      fontFamily:"Arial",fontSize:"15px",fontStyle:"bold",color:"#10233f"
    }).setOrigin(.5,0);

    const pill=this.add.graphics();
    pill.fillStyle(0xffffff,1); pill.fillRoundedRect(W-93,16,76,38,19);
    this.coinText=this.add.text(W-55,35,"⭐ "+this.coins,{
      fontFamily:"Arial",fontSize:"17px",fontStyle:"bold",color:"#10233f"
    }).setOrigin(.5);

    this.message=this.add.text(W/2,H-34,"Tap the basketball!",{
      fontFamily:"Arial",fontSize:"18px",fontStyle:"bold",color:"#10233f",
      backgroundColor:"#ffffff",padding:{x:18,y:10}
    }).setOrigin(.5).setDepth(30);
  }

  createHoop(){
    const board = this.add.rectangle(W/2,206,142,88,0xeaf7ff).setStrokeStyle(7,0xffffff).setDepth(5);
    this.add.rectangle(W/2,220,50,34,0xffffff,0).setStrokeStyle(4,0xe94b4b).setDepth(6);

    // pole
    this.add.rectangle(W/2+63,292,12,150,0x6b7280).setDepth(2);
    this.add.rectangle(W/2+63,366,82,14,0x4b5563).setDepth(2);

    // back rim
    this.rimBack=this.add.ellipse(W/2,262,78,18,0xe65722).setStrokeStyle(7,0xe65722).setDepth(8);

    // net graphics separate, so we can animate it
    this.net=this.add.graphics().setDepth(7);
    this.drawNet(1);

    // front rim sits above ball during swish
    this.rimFront=this.add.graphics().setDepth(20);
    this.rimFront.lineStyle(7,0xf36a27,1);
    this.rimFront.beginPath();
    this.rimFront.arc(W/2,264,38,0,Math.PI,false);
    this.rimFront.strokePath();
  }

  drawNet(scaleY=1){
    this.net.clear();
    this.net.lineStyle(3,0xffffff,0.95);
    const topY=270, bottomY=322 + (scaleY-1)*28;
    this.net.lineBetween(W/2-28,topY,W/2-18,bottomY);
    this.net.lineBetween(W/2+28,topY,W/2+18,bottomY);
    this.net.lineBetween(W/2-18,bottomY,W/2+18,bottomY);
    for(let i=-18;i<=18;i+=12){
      this.net.lineBetween(W/2+i,topY+4,W/2+i/2,bottomY);
    }
    for(let y=282;y<bottomY;y+=13){
      this.net.lineBetween(W/2-23,y,W/2+23,y);
    }
  }

  createPlayer(){
    this.player = this.add.container(W/2,600).setDepth(10);

    const shadow=this.add.ellipse(0,88,82,20,0x000000,0.18);
    const head=this.add.circle(0,-40,22,0x8b5a2b);
    const hair=this.add.arc(0,-48,23,200,340,false,0x1f2937);
    const body=this.add.rectangle(0,15,64,78,0x2447d8).setStrokeStyle(4,0xffffff);
    const number=this.add.text(0,14,"7",{fontFamily:"Arial",fontSize:"31px",fontStyle:"bold",color:"#ffffff"}).setOrigin(.5);

    this.leftArm=this.add.rectangle(-39,5,16,62,0x8b5a2b).setOrigin(.5,0).setAngle(18);
    this.rightArm=this.add.rectangle(39,5,16,62,0x8b5a2b).setOrigin(.5,0).setAngle(-18);
    const leftLeg=this.add.rectangle(-18,75,18,58,0x1f2937).setOrigin(.5,0);
    const rightLeg=this.add.rectangle(18,75,18,58,0x1f2937).setOrigin(.5,0);
    const shoeL=this.add.ellipse(-18,136,34,14,0xffffff);
    const shoeR=this.add.ellipse(18,136,34,14,0xffffff);

    this.player.add([shadow,leftLeg,rightLeg,shoeL,shoeR,body,number,this.leftArm,this.rightArm,head,hair]);
  }

  createBall(){
    this.ball = this.add.container(W/2,485).setDepth(18);
    const circle=this.add.circle(0,0,48,0xf27916).setStrokeStyle(4,0x4d2a0a);
    const shine=this.add.circle(-14,-15,12,0xffb14a,0.8);
    const lines=this.add.graphics();
    lines.lineStyle(3,0x4d2a0a,1);
    lines.strokeCircle(0,0,37);
    lines.lineBetween(-44,0,44,0);
    lines.lineBetween(0,-44,0,44);
    this.ballLetter=this.add.text(0,0,"A",{
      fontFamily:"Arial",fontSize:"46px",fontStyle:"bold",color:"#ffffff",
      stroke:"#7a3500",strokeThickness:5
    }).setOrigin(.5);
    this.ball.add([circle,shine,lines,this.ballLetter]);
    this.ball.setSize(100,100).setInteractive({useHandCursor:true});
    this.ball.on("pointerdown",()=>this.shoot());
  }

  createLetterReveal(){
    this.revealGlow=this.add.circle(W/2,H/2,10,0xffffff,0).setDepth(40);
    this.revealLetter=this.add.text(W/2,H/2,"A",{
      fontFamily:"Arial",fontSize:"180px",fontStyle:"bold",color:"#ffffff",
      stroke:"#f27a19",strokeThickness:12
    }).setOrigin(.5).setDepth(50).setAlpha(0).setScale(.15);

    this.particles = this.add.particles(0,0,"__DEFAULT",{
      lifespan:1000,speed:{min:160,max:420},scale:{start:.9,end:0},
      gravityY:500,quantity:0,emitting:false
    }).setDepth(45);
  }

  createStartCard(){
    const shade=this.add.rectangle(W/2,H/2,W,H,0x101828,0.92).setDepth(90);
    const card=this.add.rectangle(W/2,H/2,350,330,0xffffff).setDepth(91);
    card.setStrokeStyle(0);
    const icon=this.add.text(W/2,H/2-110,"🏀",{fontSize:"72px"}).setOrigin(.5).setDepth(92);
    const title=this.add.text(W/2,H/2-25,"Basketball Letters",{
      fontFamily:"Arial",fontSize:"32px",fontStyle:"bold",color:"#10233f"
    }).setOrigin(.5).setDepth(92);
    const body=this.add.text(W/2,H/2+38,"Tap the basketball.\nWatch the player shoot.\nHear the letter.",{
      fontFamily:"Arial",fontSize:"19px",fontStyle:"bold",align:"center",color:"#344054",lineSpacing:8
    }).setOrigin(.5).setDepth(92);
    const btn=this.add.rectangle(W/2,H/2+122,270,58,0xf58220).setDepth(92).setInteractive({useHandCursor:true});
    const btnText=this.add.text(W/2,H/2+122,"START PLAYING",{
      fontFamily:"Arial",fontSize:"19px",fontStyle:"bold",color:"#ffffff"
    }).setOrigin(.5).setDepth(93);

    btn.on("pointerdown",()=>{
      [shade,card,icon,title,body,btn,btnText].forEach(x=>x.destroy());
      this.prepareRound();
    });
  }

  prepareRound(){
    this.locked=false;
    const letter=String.fromCharCode(65+(this.index%26));
    this.ballLetter.setText(letter);
    this.revealLetter.setText(letter);

    this.ball.setPosition(W/2,485).setScale(1).setAlpha(1).setAngle(0).setDepth(18);
    this.player.setPosition(W/2,600).setScale(1);
    this.leftArm.setAngle(18);
    this.rightArm.setAngle(-18);
    this.message.setText("Tap the basketball!");
  }

  shoot(){
    if(this.locked) return;
    this.locked=true;
    const letter=String.fromCharCode(65+(this.index%26));
    this.message.setText("Shoot!");

    // gather + jump
    this.tweens.add({
      targets:this.player,y:580,scaleY:.96,duration:170,yoyo:true,
      onComplete:()=>{
        this.tweens.add({
          targets:this.player,y:535,duration:260,ease:"Sine.Out",yoyo:true,hold:210
        });
        this.tweens.add({targets:[this.leftArm,this.rightArm],angle:0,duration:220});
      }
    });

    // Bézier shot path
    const path = new Phaser.Curves.CubicBezier(
      new Phaser.Math.Vector2(W/2,485),
      new Phaser.Math.Vector2(155,205),
      new Phaser.Math.Vector2(275,145),
      new Phaser.Math.Vector2(W/2,262)
    );

    const follower={t:0};
    this.tweens.add({
      targets:follower,t:1,duration:1050,ease:"Sine.InOut",
      onUpdate:()=>{
        const p=path.getPoint(follower.t);
        this.ball.setPosition(p.x,p.y);
        this.ball.angle += 14;
        const s=1-(follower.t*.34);
        this.ball.setScale(s);
      },
      onComplete:()=>this.dropThrough(letter)
    });
  }

  dropThrough(letter){
    // move behind front rim while dropping
    this.ball.setDepth(9);
    this.tweens.add({
      targets:this.ball,y:330,scale:.53,alpha:.95,duration:330,ease:"Quad.In",
      onUpdate:()=>{ this.ball.angle += 18; },
      onStart:()=>{
        this.message.setText("SWISH!");
        this.tweens.addCounter({
          from:1,to:1.45,duration:180,yoyo:true,
          onUpdate:t=>this.drawNet(t.getValue())
        });
        this.cameras.main.shake(110,.004);
      },
      onComplete:()=>{
        this.ball.setAlpha(0);
        this.celebrate(letter);
      }
    });
  }

  celebrate(letter){
    this.coins++;
    this.coinText.setText("⭐ "+this.coins);
    localStorage.setItem("lq_phaser_coins",this.coins);

    // camera punch
    this.cameras.main.zoomTo(1.035,120,"Sine.Out",true);
    this.time.delayedCall(180,()=>this.cameras.main.zoomTo(1,180,"Sine.InOut",true));

    // glow + letter pop
    this.revealGlow.setAlpha(.9).setScale(.2);
    this.revealLetter.setAlpha(1).setScale(.15).setAngle(-8);

    this.tweens.add({
      targets:this.revealGlow,scale:18,alpha:0,duration:700,ease:"Quad.Out"
    });
    this.tweens.add({
      targets:this.revealLetter,scale:1.15,angle:4,duration:300,ease:"Back.Out",
      onComplete:()=>{
        this.tweens.add({targets:this.revealLetter,scale:1,angle:0,duration:180,ease:"Sine.Out"});
      }
    });

    // custom confetti rectangles
    const colors=[0xff4d4d,0xffd43b,0x4dabf7,0x69db7c,0xb197fc,0xff922b];
    for(let i=0;i<54;i++){
      const r=this.add.rectangle(
        W/2 + Phaser.Math.Between(-45,45),
        H/2 + Phaser.Math.Between(-20,20),
        Phaser.Math.Between(7,12),
        Phaser.Math.Between(13,22),
        Phaser.Utils.Array.GetRandom(colors)
      ).setDepth(44).setAngle(Phaser.Math.Between(0,180));
      this.tweens.add({
        targets:r,
        x:r.x+Phaser.Math.Between(-220,220),
        y:r.y+Phaser.Math.Between(-260,300),
        angle:r.angle+Phaser.Math.Between(260,900),
        alpha:0,
        duration:Phaser.Math.Between(850,1350),
        ease:"Quad.Out",
        onComplete:()=>r.destroy()
      });
    }

    sayLetter(letter);

    this.time.delayedCall(1550,()=>{
      this.tweens.add({
        targets:this.revealLetter,alpha:0,scale:1.22,y:H/2-30,duration:320,
        onComplete:()=>{
          this.revealLetter.setY(H/2);
          this.index=(this.index+1)%26;
          this.prepareRound();
        }
      });
    });
  }
}

const config={
  type:Phaser.AUTO,
  parent:"game",
  width:W,
  height:H,
  backgroundColor:"#73c9ff",
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  render:{antialias:true,pixelArt:false,roundPixels:false},
  scene:[MainScene]
};
new Phaser.Game(config);
</script>
</body>
</html>
